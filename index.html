<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⭐ Star Bank</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Star Bank">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #1a1a2e;
    --deep: #16213e;
    --card: #0f3460;
    --card2: #1a4a7a;
    --gold: #FFD700;
    --gold2: #FFA500;
    --green: #4ade80;
    --pink: #f472b6;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --red: #f87171;
    --text: #f0f4ff;
    --soft: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--sky); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star-dot { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d, 3s) ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.4); } }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px 16px 80px; }
  .header { text-align: center; padding: 20px 0 16px; }
  .header h1 { font-family: 'Fredoka One', cursive; font-size: 2.4rem; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.6); letter-spacing: 1px; }
  .header p { font-size: 0.85rem; color: var(--soft); margin-top: 2px; }
  .balance-card { background: linear-gradient(135deg, #f59e0b, #d97706, #b45309); border-radius: 24px; padding: 20px 24px; margin-bottom: 16px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(245,158,11,0.35); }
  .balance-card::after { content: '⭐'; position: absolute; right: -10px; top: -20px; font-size: 7rem; opacity: 0.15; }
  .balance-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.85; }
  .balance-num { font-family: 'Fredoka One', cursive; font-size: 3.5rem; line-height: 1; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .balance-sub { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
  .balance-row { display: flex; gap: 12px; margin-top: 14px; }
  .mini-stat { flex: 1; background: rgba(255,255,255,0.2); border-radius: 12px; padding: 8px 10px; text-align: center; }
  .mini-stat .val { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: white; }
  .mini-stat .lbl { font-size: 0.68rem; opacity: 0.85; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--deep); border-radius: 16px; padding: 5px; }
  .tab { flex: 1; padding: 9px 4px; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--soft); }
  .tab.active { background: var(--card2); color: var(--text); }
  .card { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .chore-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 14px; margin-bottom: 8px; transition: all 0.2s; background: var(--deep); cursor: pointer; border: 2px solid transparent; }
  .chore-item.done { border-color: var(--green); background: rgba(74,222,128,0.08); }
  .chore-item.done .chore-name { text-decoration: line-through; opacity: 0.6; }
  .chore-check { width: 28px; height: 28px; border-radius: 50%; border: 3px solid var(--soft); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; transition: all 0.2s; }
  .chore-item.done .chore-check { background: var(--green); border-color: var(--green); color: white; }
  .chore-name { font-weight: 700; font-size: 0.9rem; flex: 1; }
  .chore-stars { font-family: 'Fredoka One', cursive; font-size: 0.85rem; color: var(--gold); background: rgba(255,215,0,0.1); padding: 3px 8px; border-radius: 8px; }
  .chore-delete { background: none; border: none; color: var(--soft); cursor: pointer; font-size: 1rem; padding: 2px; opacity: 0.5; transition: opacity 0.2s; }
  .add-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .add-input { flex: 1; background: var(--deep); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 9px 12px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; color: var(--text); outline: none; }
  .add-input::placeholder { color: var(--soft); }
  .star-select { background: var(--deep); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 9px 8px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; color: var(--gold); outline: none; width: 68px; }
  .btn { padding: 9px 16px; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .btn-gold { background: var(--gold); color: #1a1a2e; }
  .btn-green { background: var(--green); color: #1a1a2e; }
  .btn-purple { background: var(--purple); color: #1a1a2e; }
  .btn-red { background: var(--red); color: white; }
  .btn-sm { padding: 7px 12px; font-size: 0.78rem; }
  .week-row { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 12px; }
  .day-dot { flex: 1; text-align: center; }
  .day-dot .day-label { font-size: 0.62rem; color: var(--soft); font-weight: 700; margin-bottom: 4px; }
  .day-dot .dot { width: 32px; height: 32px; border-radius: 50%; margin: 0 auto; background: var(--deep); border: 2px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; color: var(--soft); }
  .day-dot.today .dot { border-color: var(--gold); color: var(--gold); }
  .day-dot.done .dot { background: var(--green); border-color: var(--green); color: #1a1a2e; }
  .day-dot.partial .dot { background: var(--gold2); border-color: var(--gold2); color: #1a1a2e; }
  .invest-card { background: linear-gradient(135deg, #312e81, #4c1d95); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(167,139,250,0.3); }
  .invest-title { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--purple); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .invest-sub { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
  .invest-stats { display: flex; gap: 10px; margin-bottom: 14px; }
  .invest-stat { flex: 1; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px; text-align: center; }
  .invest-stat .v { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--purple); }
  .invest-stat .l { font-size: 0.68rem; color: rgba(255,255,255,0.6); }
  .rate-info { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 12px; font-size: 0.78rem; color: rgba(255,255,255,0.7); margin-bottom: 12px; line-height: 1.5; }
  .rate-info strong { color: var(--purple); }
  .amount-row { display: flex; gap: 8px; align-items: center; }
  .amount-input { flex: 1; background: rgba(255,255,255,0.1); border: 2px solid rgba(167,139,250,0.3); border-radius: 12px; padding: 9px 12px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; color: white; outline: none; font-weight: 700; }
  .spend-item { display: flex; align-items: center; gap: 10px; background: var(--deep); border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; }
  .spend-icon { font-size: 1.5rem; }
  .spend-info { flex: 1; }
  .spend-name { font-weight: 700; font-size: 0.88rem; }
  .spend-cost { font-size: 0.75rem; color: var(--gold); font-weight: 700; }
  .spend-btn { padding: 6px 12px; border: none; border-radius: 10px; background: var(--gold); color: #1a1a2e; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem; cursor: pointer; }
  .spend-btn:disabled { background: var(--soft); cursor: not-allowed; opacity: 0.6; }
  .history-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.82rem; }
  .history-icon { font-size: 1rem; width: 24px; text-align: center; }
  .history-desc { flex: 1; color: var(--soft); }
  .history-amt { font-weight: 800; font-family: 'Fredoka One', cursive; }
  .history-amt.pos { color: var(--green); }
  .history-amt.neg { color: var(--red); }
  .history-amt.inv { color: var(--purple); }
  .progress-wrap { background: var(--deep); border-radius: 99px; height: 8px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.5s ease; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border-radius: 16px; padding: 10px 20px; font-weight: 700; font-size: 0.88rem; z-index: 998; box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
